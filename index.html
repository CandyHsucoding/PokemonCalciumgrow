            <PokeballIconDisplay isAnimating={isVisuallyAnimating && throwing} />
            <span 
                className={`absolute text-4xl font-bold pointer-events-none ${ (isVisuallyAnimating && throwing) ? 'text-gray-700 opacity-90' : 'text-black' }`}
                style={{ textShadow: '0 0 5px white, 0 0 5px white' }} 
            >
              {displayValue}
            </span>
          </div>
          <button
            onClick={handleThrowClick}
            disabled={throwing} 
            className="mt-3 px-6 py-2 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-lg shadow-md disabled:bg-gray-400 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-red-400"
            aria-label="丟出寶貝球"
          >
            丟出寶貝球
          </button>
        </div>
      );
    };

    // --- EventModal.tsx ---
    const EventModal = ({ event, onClose }) => {
      if (!event) return null;

      const pointsColor = event.points >= 0 ? 'text-green-600' : 'text-red-600';
      const pointsPrefix = event.points > 0 ? '+' : '';

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
          <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md transform transition-all duration-300 ease-out scale-100">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-2xl font-bold text-purple-700">{event.title} {event.icon}</h2>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <p className="text-gray-700 mb-4 text-lg">{event.description}</p>
            <p className={`text-3xl font-bold mb-6 text-center ${pointsColor}`}>
              進化值 {pointsPrefix}{event.points}
            </p>
            <button
              onClick={onClose}
              className="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-yellow-400"
            >
              知道了！
            </button>
          </div>
        </div>
      );
    };

    // --- KnowledgeQuestionModal.tsx ---
    const KnowledgeQuestionModal = ({ question, onAnswer, onClose }) => {
      const [selectedOptionIndex, setSelectedOptionIndex] = useState(null);
      const [showFeedback, setShowFeedback] = useState(false);
      const [isCorrectAnswer, setIsCorrectAnswer] = useState(false);

      useEffect(() => {
        setSelectedOptionIndex(null);
        setShowFeedback(false);
        setIsCorrectAnswer(false);
      }, [question]);

      if (!question) return null;

      const handleSubmitAnswer = (optionIndex) => {
        setSelectedOptionIndex(optionIndex);
        const correct = question.options[optionIndex].isCorrect;
        setIsCorrectAnswer(correct);
        setShowFeedback(true);
      };

      const handleContinue = () => {
        onAnswer(isCorrectAnswer);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50" role="dialog" aria-modal="true" aria-labelledby="question-title">
          <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-lg transform transition-all duration-300 ease-out scale-100">
            {!showFeedback ? (
              <>
                <h2 id="question-title" className="text-xl sm:text-2xl font-bold text-purple-700 mb-4">{question.questionText}</h2>
                <div className="space-y-3 mb-6">
                  {question.options.map((option, index) => (
                    <button
                      key={index}
                      onClick={() => handleSubmitAnswer(index)}
                      className={`w-full text-left p-3 rounded-lg border-2 transition-colors duration-200
                                  ${selectedOptionIndex === index ? 'bg-yellow-200 border-yellow-500' : 'bg-gray-100 hover:bg-yellow-100 border-gray-300'}
                                  focus:outline-none focus:ring-2 focus:ring-yellow-400`}
                      aria-pressed={selectedOptionIndex === index}
                    >
                      {String.fromCharCode(65 + index)}. {option.text}
                    </button>
                  ))}
                </div>
              </>
            ) : (
              <div className="text-center">
                <h2 className={`text-2xl sm:text-3xl font-bold mb-3 ${isCorrectAnswer ? 'text-green-600' : 'text-red-600'}`}>
                  {isCorrectAnswer ? '答對了！🎉' : '答錯了...💧'}
                </h2>
                <p className="text-md sm:text-lg text-gray-700 mb-2">
                  {isCorrectAnswer ? question.feedbackCorrect : question.feedbackIncorrect}
                </p>
                {isCorrectAnswer && question.bonusPoints && (
                  <p className="text-lg font-semibold text-green-700 mb-4">
                    進化值 +{question.bonusPoints}
                  </p>
                )}
                <p className="text-sm text-gray-500 mb-4">
                  {isCorrectAnswer ? '準備好擲骰子前進吧！' : '沒關係，下次加油！'}
                </p>
                <button
                  onClick={handleContinue}
                  className="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-yellow-400"
                >
                  {isCorrectAnswer ? '繼續遊戲' : '知道了'}
                </button>
              </div>
            )}
            {!showFeedback && (
                <button 
                    onClick={onClose} 
                    className="absolute top-3 right-3 text-gray-400 hover:text-gray-600 text-2xl"
                    aria-label="關閉問題"
                >
                    &times;
                </button>
            )}
          </div>
        </div>
      );
    };

    // --- PlayerDisplay.tsx ---
    const PlayerDisplay = ({ player, isCurrentPlayer }) => {
      const currentStageInfo = player.pokemon.stages[player.pokemonStage];
      
      const evolutionStagesOrdered = [
        PokemonEvolutionStage.BABY, 
        PokemonEvolutionStage.CHILD, 
        PokemonEvolutionStage.TEEN, 
        PokemonEvolutionStage.ADULT
      ];
      
      const currentStageIndex = evolutionStagesOrdered.indexOf(player.pokemonStage);
      let pointsForNextStageName = '已達最高型態';
      let pointsForNextStageValue = EVOLUTION_THRESHOLDS[PokemonEvolutionStage.ADULT] + 10; 

      if (currentStageIndex < evolutionStagesOrdered.length - 1) {
        const nextStage = evolutionStagesOrdered[currentStageIndex + 1];
        pointsForNextStageName = player.pokemon.stages[nextStage].name;
        pointsForNextStageValue = EVOLUTION_THRESHOLDS[nextStage];
      }

      const pointsAtCurrentStageStart = EVOLUTION_THRESHOLDS[player.pokemonStage];
      
      const progressPercentage = (pointsForNextStageValue > pointsAtCurrentStageStart && player.growthPoints < pointsForNextStageValue) ?
        Math.min(100, ((player.growthPoints - pointsAtCurrentStageStart) / (pointsForNextStageValue - pointsAtCurrentStageStart)) * 100)
        : (player.growthPoints >= pointsForNextStageValue || player.pokemonStage === PokemonEvolutionStage.ADULT ? 100 : 0) ;

      const pokemonImageSizeClass = player.pokemonStage === PokemonEvolutionStage.BABY ? 'w-16 h-16 sm:w-20 sm:h-20' : 
                              player.pokemonStage === PokemonEvolutionStage.CHILD ? 'w-20 h-20 sm:w-24 sm:h-24' :
                              player.pokemonStage === PokemonEvolutionStage.TEEN ? 'w-24 h-24 sm:w-28 sm:h-28' : 
                              'w-28 h-28 sm:w-32 sm:h-32';

      return (
        <div className={`p-3 sm:p-4 border-4 rounded-lg shadow-lg transition-all duration-300 ${isCurrentPlayer ? 'border-yellow-400 scale-105 bg-white' : 'border-gray-300 bg-gray-50'}`}>
          <div className="flex items-center mb-2">
            <div className={`w-5 h-5 rounded-full ${player.color} mr-2 border-2 border-white shadow`}></div>
            <h3 className="text-lg sm:text-xl font-bold text-gray-800">{player.name}</h3>
          </div>
          
          <div className="flex items-center space-x-3">
            <img 
                src={player.avatarUrl} 
                alt={`${player.name} 的頭像 (${currentStageInfo.name})`} 
                className={`${pokemonImageSizeClass} rounded-full border-2 border-gray-400 shadow-md object-cover p-0.5 bg-gray-100`} 
            />
            <div>
              <p className="text-sm sm:text-md font-semibold text-purple-700">{currentStageInfo.name}</p> 
              <p className="text-xl sm:text-2xl font-bold text-orange-600">{player.growthPoints} <span className="text-sm">進化值</span></p>
            </div>
          </div>

          <div className="mt-3">
            <p className="text-xs text-gray-600 mb-1">
              成長進度 (下一階段: {pointsForNextStageName})
            </p>
            <div className="w-full bg-gray-200 rounded-full h-4 sm:h-5 border border-gray-300 overflow-hidden">
              <div
                className="bg-green-500 h-full rounded-full text-xs text-white flex items-center justify-center transition-all duration-500 ease-out"
                style={{ width: `${progressPercentage}%` }}
                role="progressbar"
                aria-label={`玩家 ${player.name} 的成長進度 ${Math.round(progressPercentage)}%`}
              >
              {player.growthPoints > 0 && progressPercentage > 10 && `${Math.round(progressPercentage)}%`}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- GameBoard.tsx ---
    const PokeballToken = ({ player }) => {
      const playerHexColor = PLAYER_COLOR_HEX_MAP[player.color]?.svg || '#cccccc'; 
      const tokenSizeClasses = "w-5 h-5 sm:w-6 sm:h-6";

      return (
        <div 
          className={`${tokenSizeClasses} rounded-full shadow-lg animate-pulse ring-1 ring-black/30 overflow-hidden`}
          title={player.name}
          style={{ animationDuration: `${1.5 + Math.random() * 0.5}s` }} 
        >
          <svg viewBox="0 0 100 100" className="w-full h-full">
            <circle cx="50" cy="50" r="50" fill={playerHexColor} />
            <rect x="0" y="45" width="100" height="10" fill="black" /> 
            <circle cx="50" cy="50" r="18" fill="white" stroke="black" strokeWidth="2"/>
            <circle cx="50" cy="50" r="11" fill={playerHexColor} stroke="black" strokeWidth="1.5" />
            <circle cx="50" cy="50" r="8" fillOpacity="0.25" fill="white" />
          </svg>
        </div>
      );
    };

    const BoardTile = ({ tile, playersOnTile }) => {
      const bgColor = TILE_BG_COLORS[tile.type] || 'bg-gray-200';
      return (
        <div 
          className={`w-24 h-24 sm:w-28 sm:h-28 border-2 border-gray-600 rounded-md flex flex-col items-center justify-center p-1 text-center shadow-md ${bgColor} relative`}
          title={tile.name}
        >
          <div className="text-2xl sm:text-3xl mb-1">{tile.icon}</div>
          <div className="text-xs sm:text-sm font-semibold">{tile.name}</div>
          <div className="flex mt-1 absolute bottom-1 right-1 space-x-0.5 items-end">
            {playersOnTile.map((p) => (
              <PokeballToken key={p.id} player={p} />
            ))}
          </div>
        </div>
      );
    };

    const GameBoard = ({ tiles, players }) => {
      const displayGrid = [
        [tiles[0], tiles[1], tiles[2], tiles[3]],
        [tiles[11], null, null, tiles[4]],
        [tiles[10], null, null, tiles[5]],
        [tiles[9], tiles[8], tiles[7], tiles[6]],
      ];


      return (
        <div className="p-2 sm:p-4 bg-yellow-100 rounded-lg shadow-xl border-4 border-yellow-300">
          <div className="grid grid-cols-4 gap-1 sm:gap-2">
            {displayGrid.flat().map((tile, index) => {
              if (!tile) {
                return <div key={`empty-${index}`} className="w-24 h-24 sm:w-28 sm:h-28 rounded-md bg-yellow-50/50"></div>; 
              }
              const playersOnThisTile = players.filter(p => p.currentTileIndex === tile.id);
              return <BoardTile key={tile.id} tile={tile} playersOnTile={playersOnThisTile} />;
            })}
          </div>
        </div>
      );
    };

    // --- GameSetup.tsx ---
    const pokeballSvgDataUri = "data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='45' fill='white' stroke='black' stroke-width='4'/%3E%3Cpath d='M 5 50 A 45 45 0 0 1 95 50 H 5 Z' fill='red'/%3E%3Cpath d='M 5 50 A 45 45 0 0 0 95 50 H 5 Z' fill='white'/%3E%3Cline x1='5' y1='50' x2='95' y2='50' stroke='black' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='16' fill='white' stroke='black' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='10' fill='lightgray' stroke='black' stroke-width='0.5'/%3E%3C/svg%3E";

    const GameSetup = ({ onSetupComplete }) => {
      const playerCounts = [1, 2, 3, 4];
      
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-green-300 via-yellow-200 to-pink-300 p-6">
          <div className="bg-white p-8 rounded-xl shadow-2xl text-center max-w-lg w-full">
            <img 
              src={pokeballSvgDataUri} 
              alt="長高大富翁 遊戲圖示 - 神奇寶貝球" 
              className="mx-auto mb-6 rounded-full border-4 border-yellow-400 shadow-lg bg-gray-100 w-32 h-32 sm:w-40 sm:h-40 object-contain" 
            />
            <h1 className="text-3xl sm:text-4xl font-bold text-purple-700 mb-2">長高大富翁</h1>
            <p className="text-lg text-gray-600 mb-8">寶可夢的成長冒險！</p>
            
            <h2 className="text-xl font-semibold text-gray-800 mb-4">選擇玩家人數：</h2>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
              {playerCounts.map(count => (
                <button
                  key={count}
                  onClick={() => onSetupComplete(count)}
                  className="px-6 py-4 bg-yellow-500 hover:bg-yellow-600 text-white font-bold text-lg rounded-lg shadow-md transition-transform transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                  aria-label={`選擇 ${count} 位玩家`}
                >
                  {count} {count === 1 ? '人' : '人'}
                </button>
              ))}
            </div>
            <p className="text-sm text-gray-500">遊戲時間約 3-5 分鐘。</p>
          </div>
        </div>
      );
    };

    // --- GameOverScreen.tsx ---
    const GameOverScreen = ({ players, onRestart }) => {
      const sortedPlayers = [...players].sort((a, b) => b.growthPoints - a.growthPoints);

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-300 via-indigo-200 to-purple-300 p-6 text-center">
          <div className="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full">
            <h1 className="text-3xl sm:text-4xl font-bold text-purple-700 mb-6">遊戲結束！</h1>
            
            <div className="space-y-4 mb-8">
              {sortedPlayers.map((player, index) => {
                const stageInfo = player.pokemon.stages[player.pokemonStage];
                const pokemonImageSizeClass = player.pokemonStage === PokemonEvolutionStage.BABY ? 'w-12 h-12 sm:w-16 sm:h-16' : 
                                         player.pokemonStage === PokemonEvolutionStage.CHILD ? 'w-14 h-14 sm:w-20 sm:h-20' :
                                         player.pokemonStage === PokemonEvolutionStage.TEEN ? 'w-16 h-16 sm:w-24 sm:h-24' : 
                                         'w-20 h-20 sm:w-28 sm:h-28';
                
                return (
                  <div key={player.id} className={`p-4 rounded-lg shadow-md flex items-center space-x-4 ${index === 0 ? 'bg-yellow-100 border-2 border-yellow-400' : 'bg-gray-100'}`}>
                    <div className={`text-2xl font-bold ${index === 0 ? 'text-yellow-600' : 'text-gray-700'}`}>#{index + 1}</div>
                    <img 
                        src={player.avatarUrl} 
                        alt={`${player.name} 的頭像 (${stageInfo.name})`} 
                        className={`${pokemonImageSizeClass} rounded-full border-2 border-gray-300 object-cover bg-gray-100 p-0.5`}
                    />
                    <div className="text-left flex-grow">
                      <p className="text-lg font-semibold text-gray-800">{player.name}</p>
                      <p className="text-md text-purple-600">進化為：{stageInfo.name}</p> 
                    </div>
                    <p className="text-xl font-bold text-orange-600 ml-auto">{player.growthPoints} 進化值</p>
                  </div>
                );
              })}
            </div>

            <div className="bg-green-100 p-4 rounded-lg border border-green-300 mb-8">
              <h2 className="text-xl font-semibold text-green-700 mb-2">成長小叮嚀：</h2>
              <p className="text-md text-green-800">
                恭喜你完成了成長冒險！無論你的寶可夢進化成什麼樣子，記得「先天基因影響身高，但後天努力更關鍵！」保持健康的生活習慣，均衡飲食、充足睡眠、適度運動，你就能長得更高更健康！
              </p>
            </div>

            <button
              onClick={onRestart}
              className="px-8 py-3 bg-yellow-500 hover:bg-yellow-600 text-white font-bold text-lg rounded-lg shadow-md transition-transform transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-yellow-400"
              aria-label="重新開始遊戲"
            >
              重新開始
            </button>
          </div>
        </div>
      );
    };

    // --- App.tsx ---
    const App = () => {
      const [players, setPlayers] = useState([]);
      const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
      const [currentThrowValue, setCurrentThrowValue] = useState(null);
      const [activeEvent, setActiveEvent] = useState(null);
      const [gamePhase, setGamePhase] = useState(GamePhase.SETUP);
      const [totalTurnsPlayed, setTotalTurnsPlayed] = useState(0);
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [isQuestionModalVisible, setIsQuestionModalVisible] = useState(false);

      const updatePlayerPokemonStage = useCallback((player) => {
        let newStage = player.pokemonStage;
        const stagesOrdered = [
            PokemonEvolutionStage.BABY, 
            PokemonEvolutionStage.CHILD, 
            PokemonEvolutionStage.TEEN, 
            PokemonEvolutionStage.ADULT
        ];
        
        for (let i = stagesOrdered.length - 1; i >= 0; i--) {
            const stageEnum = stagesOrdered[i];
            if (player.growthPoints >= EVOLUTION_THRESHOLDS[stageEnum]) {
                newStage = stageEnum;
                break;
            }
        }
        return { ...player, pokemonStage: newStage };
      }, []);

      const initializeGame = useCallback((numPlayers) => {
        const newPlayers = [];
        for (let i = 0; i < numPlayers; i++) {
          newPlayers.push({
            id: `player-${i + 1}`,
            name: `玩家 ${i + 1}`,
            pokemon: DEFAULT_POKEMON,
            growthPoints: 0,
            currentTileIndex: 0,
            color: PLAYER_COLORS[i % PLAYER_COLORS.length],
            avatarUrl: PLAYER_AVATAR_URLS[i % PLAYER_AVATAR_URLS.length], 
            pokemonStage: PokemonEvolutionStage.BABY,
          });
        }
        setPlayers(newPlayers.map(p => updatePlayerPokemonStage(p)));
        setCurrentPlayerIndex(0);
        setGamePhase(GamePhase.PLAYER_TURN_START);
        setTotalTurnsPlayed(0);
        setActiveEvent(null);
        setCurrentThrowValue(null); 
        setCurrentQuestion(null);
        setIsQuestionModalVisible(false);
      }, [updatePlayerPokemonStage]);

      const handleSetupComplete = (numPlayers) => {
        initializeGame(numPlayers);
      };

      const endTurn = useCallback(() => {
        setActiveEvent(null); 
        setIsQuestionModalVisible(false); 
        setCurrentQuestion(null);

        const nextPlayerIndex = (currentPlayerIndex + 1) % players.length;
        let newTotalTurnsPlayed = totalTurnsPlayed;

        if (nextPlayerIndex === 0 && players.length > 0) { 
            newTotalTurnsPlayed = totalTurnsPlayed + 1;
        }
        
        if (newTotalTurnsPlayed >= MAX_TURNS_PER_PLAYER) { 
          setGamePhase(GamePhase.GAME_OVER);
        } else {
          setCurrentPlayerIndex(nextPlayerIndex);
          setTotalTurnsPlayed(newTotalTurnsPlayed); 
          setGamePhase(GamePhase.PLAYER_TURN_START);
          setCurrentThrowValue(null); 
        }
      }, [totalTurnsPlayed, players.length, currentPlayerIndex]);

      const handleTakeAction = () => {
        if (Math.random() < QUESTION_CHANCE && GROWTH_KNOWLEDGE_QUESTIONS.length > 0) {
          const randomIndex = Math.floor(Math.random() * GROWTH_KNOWLEDGE_QUESTIONS.length);
          setCurrentQuestion(GROWTH_KNOWLEDGE_QUESTIONS[randomIndex]);
          setIsQuestionModalVisible(true);
          setGamePhase(GamePhase.KNOWLEDGE_QUESTION);
        } else {
          setGamePhase(GamePhase.AWAITING_DICE_ROLL); 
        }
      };

      const handleQuestionAnswer = useCallback((isCorrect) => {
        setIsQuestionModalVisible(false); 
        
        let playerToUpdate = players[currentPlayerIndex];

        if (isCorrect) {
          const bonus = currentQuestion?.bonusPoints ?? QUESTION_CORRECT_BONUS;
          playerToUpdate = { ...playerToUpdate, growthPoints: Math.max(0, playerToUpdate.growthPoints + bonus) };
          playerToUpdate = updatePlayerPokemonStage(playerToUpdate);
          
          setPlayers(prevPlayers => prevPlayers.map((p, index) => index === currentPlayerIndex ? playerToUpdate : p));
          setCurrentQuestion(null); 
          setGamePhase(GamePhase.AWAITING_DICE_ROLL); 
        } else {
          setCurrentQuestion(null); 
          endTurn(); 
        }
      }, [players, currentPlayerIndex, currentQuestion, updatePlayerPokemonStage, endTurn]);
      
      const handleQuestionModalClose = useCallback(() => {
        setIsQuestionModalVisible(false);
        if(gamePhase === GamePhase.KNOWLEDGE_QUESTION && currentQuestion) { 
            endTurn(); 
        }
        setCurrentQuestion(null);
      }, [gamePhase, currentQuestion, endTurn]);

      const performThrowAndMove = useCallback((throwValue) => {
        setCurrentThrowValue(throwValue);
        setGamePhase(GamePhase.DICE_ROLLING); 

        setTimeout(() => { 
          setGamePhase(GamePhase.PLAYER_MOVING);
          const currentPlayer = players[currentPlayerIndex];
          const currentTileValidIndex = typeof currentPlayer.currentTileIndex === 'number' ? currentPlayer.currentTileIndex : 0;
          const newTileIndex = (currentTileValidIndex + throwValue) % BOARD_TILES_COUNT;
          
          let updatedPlayers = players.map((p, index) => 
            index === currentPlayerIndex ? { ...p, currentTileIndex: newTileIndex } : p
          );
          setPlayers(updatedPlayers.map(p => updatePlayerPokemonStage(p)));

          setTimeout(() => { 
            const currentTile = BOARD_TILES.find(tile => tile.id === newTileIndex);
            if (currentTile && currentTile.type !== TileType.START && currentTile.possibleEventIds.length > 0) {
              const randomEventId = currentTile.possibleEventIds[Math.floor(Math.random() * currentTile.possibleEventIds.length)];
              const event = GAME_EVENTS.find(e => e.id === randomEventId);
              if (event) {
                setActiveEvent(event);
                setGamePhase(GamePhase.EVENT_TRIGGERED);
                
                setPlayers(prevPlayers => prevPlayers.map((p, index) => {
                  if (index === currentPlayerIndex) {
                    const updatedPlayer = { ...p, growthPoints: Math.max(0, p.growthPoints + event.points) };
                    return updatePlayerPokemonStage(updatedPlayer); 
                  }
                  return p;
                }));
              } else { 
                endTurn(); 
              }
            } else { 
              endTurn(); 
            }
          }, 500); 
        }, 700); 
      }, [players, currentPlayerIndex, updatePlayerPokemonStage, endTurn]);

      const handleEventModalClose = () => {
        setActiveEvent(null);
        endTurn();
      };
      
      const handleRestartGame = () => {
        setGamePhase(GamePhase.SETUP);
      };

      if (gamePhase === GamePhase.SETUP) {
        return <GameSetup onSetupComplete={handleSetupComplete} />;
      }

      if (gamePhase === GamePhase.GAME_OVER) {
        return <GameOverScreen players={players} onRestart={handleRestartGame} />;
      }
      
      if (players.length === 0) {
        return <div className="flex items-center justify-center h-screen text-xl">載入遊戲中...</div>;
      }

      const currentPlayer = players[currentPlayerIndex];
      const roundNumber = totalTurnsPlayed + 1; 

      let turnStatusText = `回合 ${roundNumber} - ${currentPlayer.name} 的回合`;
      if (gamePhase === GamePhase.DICE_ROLLING) {
        turnStatusText = `${currentPlayer.name} 寶貝球投擲中...`;
      } else if (gamePhase === GamePhase.PLAYER_MOVING) {
        turnStatusText = `${currentPlayer.name} 移動中...`;
      } else if (gamePhase === GamePhase.KNOWLEDGE_QUESTION && currentQuestion) {
        turnStatusText = `${currentPlayer.name} 請回答問題！`;
      } else if (gamePhase === GamePhase.AWAITING_DICE_ROLL) {
        turnStatusText = `${currentPlayer.name} 請丟出寶貝球！`;
      } else if (gamePhase === GamePhase.EVENT_TRIGGERED && activeEvent) {
        turnStatusText = `${currentPlayer.name} 觸發了事件：${activeEvent.title}`;
      }


      return (
        <div className="min-h-screen bg-gradient-to-br from-purple-200 via-pink-200 to-yellow-100 flex flex-col items-center justify-center p-2 sm:p-4 selection:bg-yellow-300">
          <div className="w-full max-w-5xl mx-auto">
            <header className="mb-4 text-center">
              <h1 className="text-3xl sm:text-4xl font-bold text-purple-700">長高大富翁</h1>
              <p className="text-md sm:text-lg text-purple-500">寶可夢的成長冒險！</p>
              <p className="text-sm text-gray-600 mt-1">{turnStatusText}</p>
            </header>

            <main className="grid grid-cols-1 lg:grid-cols-3 gap-4">
              <div className="lg:col-span-2 order-2 lg:order-1">
                <GameBoard tiles={BOARD_TILES} players={players} />
              </div>

              <div className="lg:col-span-1 order-1 lg:order-2 space-y-3">
                {players.map((player, index) => (
                  <PlayerDisplay 
                    key={player.id} 
                    player={player} 
                    isCurrentPlayer={index === currentPlayerIndex} 
                  />
                ))}
              </div>
            </main>

            <footer className="mt-4 text-center">
              {gamePhase === GamePhase.PLAYER_TURN_START && (
                <button
                  onClick={handleTakeAction}
                  className="px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow-lg text-lg transform transition hover:scale-105"
                >
                  開始行動！
                </button>
              )}

              {gamePhase === GamePhase.AWAITING_DICE_ROLL && (
                <PokeballThrow 
                  onThrow={performThrowAndMove} 
                  throwing={false} 
                  value={currentThrowValue} 
                />
              )}

              {(gamePhase === GamePhase.DICE_ROLLING) && (
                <PokeballThrow 
                  onThrow={() => {}} 
                  throwing={true}  
                  value={currentThrowValue} 
                />
              )}

            </footer>
          </div>

          {activeEvent && gamePhase === GamePhase.EVENT_TRIGGERED && (
            <EventModal event={activeEvent} onClose={handleEventModalClose} />
          )}

          {isQuestionModalVisible && currentQuestion && gamePhase === GamePhase.KNOWLEDGE_QUESTION && (
            <KnowledgeQuestionModal 
                question={currentQuestion} 
                onAnswer={handleQuestionAnswer} 
                onClose={handleQuestionModalClose} 
            />
          )}
        </div>
      );
    };

    // --- Mount ---
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );

    </script>
</body>
</html>
